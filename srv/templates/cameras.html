{{define "content"}}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-camera-video"></i> Caméras de surveillance</h2>
    <div>
        <button class="btn btn-outline-secondary btn-sm" id="view-grid">
            <i class="bi bi-grid-3x3"></i> Grille
        </button>
        <button class="btn btn-outline-secondary btn-sm" id="view-list">
            <i class="bi bi-list"></i> Liste
        </button>
    </div>
</div>

<div class="row g-3" id="cameras-grid">
    <!-- Cameras will be loaded here -->
    <div class="col-12 text-center py-5">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Chargement...</span>
        </div>
        <p class="mt-2 text-muted">Chargement des caméras...</p>
    </div>
</div>
{{end}}

{{define "scripts"}}
<script>
document.addEventListener('DOMContentLoaded', function() {
    loadCameras();
});

async function loadCameras() {
    try {
        const resp = await fetch('/api/cameras');
        const cameras = await resp.json();
        renderCameras(cameras);
    } catch (e) {
        console.error('Failed to load cameras:', e);
    }
}

function renderCameras(cameras) {
    const grid = document.getElementById('cameras-grid');
    
    if (!cameras || cameras.length === 0) {
        grid.innerHTML = '<div class="col-12 text-center py-5"><p class="text-muted">Aucune caméra configurée</p></div>';
        return;
    }

    grid.innerHTML = cameras.map(c => {
        const statusClass = c.statut === 'active' ? 'success' : c.statut === 'maintenance' ? 'warning' : 'secondary';
        const statusText = c.statut === 'active' ? 'En ligne' : c.statut === 'maintenance' ? 'Maintenance' : 'Hors ligne';
        const alertBadge = c.alertes_actives > 0 ? `<span class="position-absolute top-0 end-0 m-2 badge bg-danger">${c.alertes_actives} alerte(s)</span>` : '';
        
        return `
            <div class="col-md-6 col-lg-4 col-xl-3">
                <div class="card camera-card h-100">
                    <div class="position-relative">
                        <div class="camera-feed">
                            <div class="camera-placeholder-large">
                                <i class="bi bi-camera-video"></i>
                                <span>${c.nom}</span>
                                <small class="text-muted d-block mt-2">
                                    ${c.statut === 'active' ? 'Flux vidéo simulé' : 'Caméra indisponible'}
                                </small>
                            </div>
                        </div>
                        ${alertBadge}
                        <span class="position-absolute bottom-0 start-0 m-2 badge bg-${statusClass}">
                            <i class="bi bi-circle-fill"></i> ${statusText}
                        </span>
                    </div>
                    <div class="card-body">
                        <h6 class="card-title">${c.nom}</h6>
                        <p class="card-text small text-muted mb-1">
                            <i class="bi bi-geo-alt"></i> ${c.zone_nom || 'Zone non assignée'}
                        </p>
                        <p class="card-text small text-muted">
                            <i class="bi bi-pin-map"></i> ${c.emplacement || '-'}
                        </p>
                    </div>
                    <div class="card-footer bg-transparent">
                        <div class="btn-group btn-group-sm w-100">
                            <button class="btn btn-outline-primary" onclick="viewCamera(${c.id})">
                                <i class="bi bi-fullscreen"></i> Agrandir
                            </button>
                            <button class="btn btn-outline-secondary" onclick="cameraSettings(${c.id})">
                                <i class="bi bi-gear"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

function viewCamera(id) {
    alert('Vue plein écran de la caméra ' + id + ' (fonctionnalité à implémenter)');
}

function cameraSettings(id) {
    alert('Paramètres de la caméra ' + id + ' (fonctionnalité à implémenter)');
}
</script>
{{end}}
