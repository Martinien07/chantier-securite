{{define "select_site"}}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeSite AI - Sélection du site</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --primary-dark: #1d4ed8; }
        body { background: linear-gradient(135deg, #1e3a5f 0%, #0f2744 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .select-card { background: white; border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 500px; box-shadow: 0 25px 50px rgba(0,0,0,0.3); }
        .logo { text-align: center; margin-bottom: 2rem; }
        .logo i { font-size: 3rem; color: var(--primary); }
        .logo h1 { font-size: 1.8rem; font-weight: 700; margin-top: 0.5rem; color: #1e293b; }
        .search-box { position: relative; margin-bottom: 1.5rem; }
        .search-box input { padding-left: 2.5rem; border-radius: 10px; height: 48px; }
        .search-box i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: #94a3b8; }
        .site-list { max-height: 300px; overflow-y: auto; }
        .site-item { display: flex; align-items: center; padding: 1rem; border-radius: 10px; cursor: pointer; transition: all 0.2s; border: 2px solid transparent; margin-bottom: 0.5rem; background: #f8fafc; }
        .site-item:hover { background: #e2e8f0; border-color: var(--primary); }
        .site-item.selected { background: #dbeafe; border-color: var(--primary); }
        .site-icon { width: 48px; height: 48px; background: var(--primary); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.5rem; margin-right: 1rem; }
        .site-info h5 { margin: 0; font-weight: 600; color: #1e293b; }
        .site-info p { margin: 0; font-size: 0.875rem; color: #64748b; }
        .btn-connect { width: 100%; height: 48px; border-radius: 10px; font-weight: 600; margin-top: 1rem; }
        .no-results { text-align: center; padding: 2rem; color: #64748b; }
    </style>
</head>
<body>
    <div class="select-card">
        <div class="logo">
            <i class="bi bi-shield-check"></i>
            <h1>SafeSite AI</h1>
            <p class="text-muted">Sélectionnez un chantier pour continuer</p>
        </div>
        
        <div class="search-box">
            <i class="bi bi-search"></i>
            <input type="text" class="form-control" id="search" placeholder="Rechercher un site..." oninput="searchSites(this.value)">
        </div>
        
        <div class="site-list" id="siteList">
            {{range .Sites}}
            <div class="site-item" onclick="selectSite(this, {{.ID}})" data-name="{{.Name}}" data-location="{{.Location}}">
                <div class="site-icon"><i class="bi bi-building"></i></div>
                <div class="site-info">
                    <h5>{{.Name}}</h5>
                    <p><i class="bi bi-geo-alt me-1"></i>{{.Location}}</p>
                </div>
            </div>
            {{else}}
            <div class="no-results"><i class="bi bi-building" style="font-size:2rem"></i><p class="mt-2">Aucun site disponible</p></div>
            {{end}}
        </div>
        
        <form method="POST" action="/select-site" id="siteForm">
            <input type="hidden" name="site_id" id="siteIdInput">
            <button type="submit" class="btn btn-primary btn-connect" id="connectBtn" disabled>
                <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter au site
            </button>
        </form>
    </div>
    
    <script>
    let selectedSiteId = null;
    
    function selectSite(el, id) {
        document.querySelectorAll('.site-item').forEach(item => item.classList.remove('selected'));
        el.classList.add('selected');
        selectedSiteId = id;
        document.getElementById('siteIdInput').value = id;
        document.getElementById('connectBtn').disabled = false;
        document.getElementById('connectBtn').innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Se connecter à ' + el.dataset.name;
    }
    
    function searchSites(query) {
        query = query.toLowerCase();
        document.querySelectorAll('.site-item').forEach(item => {
            const name = item.dataset.name.toLowerCase();
            const location = item.dataset.location.toLowerCase();
            item.style.display = (name.includes(query) || location.includes(query)) ? '' : 'none';
        });
    }
    </script>
</body>
</html>
{{end}}
