{{define "zones"}}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeSite AI - Zones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex">
        {{template "sidebar" .}}
        <main class="main-content">
            <h1 class="page-title"><i class="bi bi-geo-alt"></i> Zones de surveillance</h1>
            <div class="card">
                <div class="card-header">Liste des zones</div>
                <div class="card-body p-0">
                    <table class="table table-hover">
                        <thead><tr><th>Nom</th><th>Type</th><th>Site / Niveau</th><th>Risque</th><th>Statut</th></tr></thead>
                        <tbody>
                            {{range .Zones}}
                            <tr>
                                <td><strong>{{.Name}}</strong></td>
                                <td>{{.Type}}</td>
                                <td>{{.SiteName}} - {{.Level}}</td>
                                <td><span class="badge badge-{{.RiskLevel}}">{{.RiskLevel}}</span></td>
                                <td>{{if .IsActive}}<span class="badge bg-success">Active</span>{{else}}<span class="badge bg-secondary">Inactive</span>{{end}}</td>
                            </tr>
                            {{else}}
                            <tr><td colspan="5" class="text-center text-muted py-4">Aucune zone</td></tr>
                            {{end}}
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
{{end}}
