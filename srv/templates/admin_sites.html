{{define "admin_sites"}}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeSite AI - Sites</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex">
        {{template "sidebar"}}
        <main class="main-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="page-title mb-0"><i class="bi bi-building"></i> Gestion des sites</h1>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addSiteModal"><i class="bi bi-plus me-2"></i>Nouveau</button>
            </div>
            <div class="card">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead><tr><th>ID</th><th>Nom</th><th>Localisation</th><th>Description</th><th>Actions</th></tr></thead>
                        <tbody>
                            {{range .Sites}}
                            <tr>
                                <td>{{.ID}}</td>
                                <td><strong>{{.Name}}</strong></td>
                                <td>{{.Location}}</td>
                                <td>{{.Description}}</td>
                                <td><button class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i></button></td>
                            </tr>
                            {{else}}
                            <tr><td colspan="5" class="text-center py-4 text-muted">Aucun site</td></tr>
                            {{end}}
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <div class="modal fade" id="addSiteModal"><div class="modal-dialog"><div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Nouveau site</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
            <form id="addSiteForm">
                <div class="mb-3"><label class="form-label">Nom</label><input type="text" class="form-control" name="name" required></div>
                <div class="mb-3"><label class="form-label">Localisation</label><input type="text" class="form-control" name="location"></div>
                <div class="mb-3"><label class="form-label">Description</label><textarea class="form-control" name="description"></textarea></div>
            </form>
        </div>
        <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button><button type="button" class="btn btn-primary" onclick="addSite()">Créer</button></div>
    </div></div></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    function addSite() {
        const form = document.getElementById('addSiteForm');
        const data = Object.fromEntries(new FormData(form));
        fetch('/api/admin/sites', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)}).then(()=>location.reload());
    }
    </script>
</body>
</html>
{{end}}
