{{define "admin_rules"}}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeSite AI - Règles HSE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex">
        {{template "sidebar"}}
        <main class="main-content">
            <h1 class="page-title"><i class="bi bi-shield-check"></i> Règles HSE</h1>
            <div class="card">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead><tr><th>Nom</th><th>Description</th><th>Condition</th><th>Sévérité</th><th>Statut</th></tr></thead>
                        <tbody>
                            {{range .Rules}}
                            <tr>
                                <td><strong>{{.Name}}</strong></td>
                                <td>{{.Description}}</td>
                                <td><code>{{.ConditionLogic}}</code></td>
                                <td><span class="badge bg-warning">{{.Severity}}/5</span></td>
                                <td><span class="badge bg-success">Active</span></td>
                            </tr>
                            {{else}}
                            <tr><td colspan="5" class="text-center py-4 text-muted">Aucune règle</td></tr>
                            {{end}}
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
{{end}}
