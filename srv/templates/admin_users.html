{{define "admin_users"}}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeSite AI - Utilisateurs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex">
        {{template "sidebar" .}}
        <main class="main-content">
            <h1 class="page-title"><i class="bi bi-people"></i> Utilisateurs</h1>
            <div class="card">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead><tr><th>ID</th><th>Nom</th><th>Email</th><th>Statut</th></tr></thead>
                        <tbody>
                            {{range .Users}}
                            <tr>
                                <td>{{.ID}}</td>
                                <td><strong>{{.Username}}</strong></td>
                                <td>{{.Email}}</td>
                                <td>{{if eq .IsActive 1}}<span class="badge bg-success">Actif</span>{{else}}<span class="badge bg-secondary">Inactif</span>{{end}}</td>
                            </tr>
                            {{else}}
                            <tr><td colspan="4" class="text-center py-4 text-muted">Aucun utilisateur</td></tr>
                            {{end}}
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
{{end}}
