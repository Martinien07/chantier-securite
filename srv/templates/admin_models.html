{{define "admin_models"}}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeSite AI - Modèles IA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex">
        {{template "sidebar"}}
        <main class="main-content">
            <h1 class="page-title"><i class="bi bi-cpu"></i> Modèles IA</h1>
            <div class="card">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead><tr><th>Nom</th><th>Type</th><th>Version</th><th>Metrics</th><th>Statut</th></tr></thead>
                        <tbody>
                            {{range .Models}}
                            <tr>
                                <td><strong>{{.Name}}</strong></td>
                                <td><span class="badge bg-primary">{{.Type}}</span></td>
                                <td>{{.Version}}</td>
                                <td><code class="small">{{.Metrics}}</code></td>
                                <td>{{if eq .IsActive 1}}<span class="badge bg-success">Actif</span>{{else}}<span class="badge bg-secondary">Inactif</span>{{end}}</td>
                            </tr>
                            {{else}}
                            <tr><td colspan="5" class="text-center py-4 text-muted">Aucun modèle</td></tr>
                            {{end}}
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
{{end}}
