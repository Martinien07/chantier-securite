    <ul class="nav flex-column">

        <li class="nav-item"><a class="nav-link" href="/zones"><i class="bi bi-geo-alt"></i> Zones</a></li>
        <li class="nav-item"><a class="nav-link" href="/analyses"><i class="bi bi-graph-up"></i> Analyses IA</a></li>

        <li class="nav-item"><a class="nav-link" href="/suivi"><i class="bi bi-activity"></i> Suivi</a></li>
        
    </ul>
    <div class="sidebar-divider"></div>
    <ul class="nav flex-column">
        <li class="nav-item"><a class="nav-link" href="/admin"><i class="bi bi-gear"></i> Administration</a></li>
    </ul>
</nav>
