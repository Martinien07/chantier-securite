{{define "cameras"}}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeSite AI - Caméras</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex">
        {{template "sidebar" .}}
        <main class="main-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="page-title mb-0"><i class="bi bi-camera-video"></i> Caméras</h1>
                <a href="/admin/cameras" class="btn btn-primary"><i class="bi bi-gear me-2"></i>Gérer</a>
            </div>
            <div class="row g-4">
                {{range .Cameras}}
                <div class="col-md-4 col-lg-3">
                    <div class="card camera-card">
                        <div class="camera-preview">
                            {{if .IsWebcam}}
                            <span class="webcam-badge"><i class="bi bi-webcam"></i> Webcam</span>
                            <video id="webcam-{{.ID}}" autoplay muted playsinline></video>
                            {{else}}
                            <i class="bi bi-camera-video"></i>
                            {{end}}
                            <span class="camera-status"></span>
                        </div>
                        <div class="card-body">
                            <h6 class="card-title mb-1">{{.Name}}</h6>
                            <div class="small text-muted">{{.Level}}</div>
                            {{if .IsWebcam}}
                            <button class="btn btn-sm btn-primary mt-2" onclick="startWebcam({{.ID}})">
                                <i class="bi bi-play-fill"></i> Démarrer
                            </button>
                            {{end}}
                        </div>
                    </div>
                </div>
                {{else}}
                <div class="col-12">
                    <div class="card"><div class="card-body text-center py-5">
                        <i class="bi bi-camera-video" style="font-size:3rem;color:var(--secondary)"></i>
                        <p class="mt-3 mb-0 text-muted">Aucune caméra</p>
                        <a href="/admin/cameras" class="btn btn-primary mt-3">Ajouter</a>
                    </div></div>
                </div>
                {{end}}
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    function startWebcam(camId) {
        const video = document.getElementById('webcam-' + camId);
        if (video && navigator.mediaDevices) {
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => { video.srcObject = stream; })
                .catch(err => alert('Erreur webcam: ' + err.message));
        }
    }
    </script>
</body>
</html>
{{end}}
