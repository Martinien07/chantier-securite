{{define "rapports"}}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeSite AI - Rapports</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex">
        {{template "sidebar" .}}
        <main class="main-content">
            <h1 class="page-title"><i class="bi bi-file-earmark-text"></i> Rapports</h1>
            <div class="row g-4">
                <div class="col-md-4">
                    <div class="card text-center p-4">
                        <i class="bi bi-calendar-day" style="font-size:3rem;color:var(--primary)"></i>
                        <h5 class="mt-3">Rapport journalier</h5>
                        <p class="text-muted small">Résumé des alertes du jour</p>
                        <button class="btn btn-primary"><i class="bi bi-download me-2"></i>Générer</button>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card text-center p-4">
                        <i class="bi bi-calendar-week" style="font-size:3rem;color:var(--primary)"></i>
                        <h5 class="mt-3">Rapport hebdomadaire</h5>
                        <p class="text-muted small">Tendances de la semaine</p>
                        <button class="btn btn-primary"><i class="bi bi-download me-2"></i>Générer</button>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card text-center p-4">
                        <i class="bi bi-calendar-month" style="font-size:3rem;color:var(--primary)"></i>
                        <h5 class="mt-3">Rapport mensuel</h5>
                        <p class="text-muted small">Statistiques du mois</p>
                        <button class="btn btn-primary"><i class="bi bi-download me-2"></i>Générer</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
{{end}}
